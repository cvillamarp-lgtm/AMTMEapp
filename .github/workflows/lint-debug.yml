name: Lint Debug

on:
  pull_request:
    branches:
      - main

jobs:
  lint-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Capture ESLint report
        run: |
          set +e
          npm run lint -- --format stylish > lint-report.txt 2>&1
          echo $? > lint-exit-code.txt
          cat lint-report.txt
          exit 0

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            lint-report.txt
            lint-exit-code.txt
