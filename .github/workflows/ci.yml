name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint -- --format stylish > lint-report.txt 2>&1

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-lint-report
          path: lint-report.txt

      - name: Fail on lint error
        if: steps.lint.outcome != 'success'
        run: |
          cat lint-report.txt
          exit 1

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
